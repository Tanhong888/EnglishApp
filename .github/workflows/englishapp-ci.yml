name: EnglishAPP CI

on:
  push:
    paths:
      - 'EnglishAPP/**'
      - '.github/workflows/englishapp-ci.yml'
  pull_request:
    paths:
      - 'EnglishAPP/**'
      - '.github/workflows/englishapp-ci.yml'

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EnglishAPP/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -e .[dev]

      - name: Run backend tests
        run: python -m pytest tests -q

  desktop:
    name: Desktop analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EnglishAPP/desktop_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install desktop dependencies
        run: flutter pub get

      - name: Analyze desktop app
        run: flutter analyze

      - name: Run desktop tests
        run: flutter test
